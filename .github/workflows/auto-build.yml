name: Legacy Pages Disabled

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-disabled-page:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Build disabled legacy page
        run: |
          mkdir -p site
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="ja">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta name="robots" content="noindex,nofollow,noarchive">
            <title>Disabled</title>
            <style>
              body { margin: 0; font-family: system-ui, sans-serif; color: #111827; background: #f9fafb; }
              main { max-width: 640px; margin: 20vh auto; padding: 0 24px; }
              h1 { font-size: 24px; line-height: 1.3; }
              p { line-height: 1.8; color: #4b5563; }
            </style>
          </head>
          <body>
            <main>
              <h1>このページは公開停止しました</h1>
              <p>このURLでの公開は終了しています。</p>
            </main>
          </body>
          </html>
          HTML
          cat > site/robots.txt <<'TXT'
          User-agent: *
          Disallow: /
          TXT
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
